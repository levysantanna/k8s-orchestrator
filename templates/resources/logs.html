{% extends "base.html" %}

{% block title %}Pod Logs - {{ pod_name }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2><i class="fas fa-file-alt"></i> Pod Logs</h2>
                <p class="text-muted">
                    <strong>Cluster:</strong> {{ cluster.name }} |
                    <strong>Namespace:</strong> {{ namespace }} |
                    <strong>Pod:</strong> {{ pod_name }}
                </p>
            </div>
            <a href="{{ url_for('cluster.detail', cluster_id=cluster.id) }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>Container Logs (last 100 lines)</strong>
                <a href="{{ url_for('cluster.pod_logs', cluster_id=cluster.id, namespace=namespace, pod_name=pod_name, tail=500) }}"
                   class="btn btn-sm btn-outline-primary">
                    <i class="fas fa-sync"></i> Show More (500 lines)
                </a>
            </div>
            <div class="card-body">
                <pre class="bg-dark text-light p-3" style="max-height: 600px; overflow-y: auto;"><code>{{ logs }}</code></pre>
            </div>
        </div>
    </div>
</div>

{% endblock %}
