---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pvcreplications.pvcreplicator.k8s-orchestrator.io
spec:
  group: pvcreplicator.k8s-orchestrator.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - sourcePVC
                - targetCluster
              properties:
                sourcePVC:
                  type: string
                  description: "Name of the source PVC to replicate"
                targetCluster:
                  type: string
                  description: "Target cluster name (must have kubeconfig secret)"
                targetNamespace:
                  type: string
                  description: "Target namespace (defaults to source namespace)"
                schedule:
                  type: string
                  description: "Cron schedule for replication (default: 0 */6 * * *)"
                  pattern: '^(\*|([0-9]|1[0-9]|2[0-9]|3[0-9]|4[0-9]|5[0-9])|\*\/([0-9]|1[0-9]|2[0-9]|3[0-9]|4[0-9]|5[0-9])) (\*|([0-9]|1[0-9]|2[0-3])|\*\/([0-9]|1[0-9]|2[0-3])) (\*|([1-9]|1[0-9]|2[0-9]|3[0-1])|\*\/([1-9]|1[0-9]|2[0-9]|3[0-1])) (\*|([1-9]|1[0-2])|\*\/([1-9]|1[0-2])) (\*|([0-6])|\*\/([0-6]))$'
                rsyncOptions:
                  type: string
                  description: "Additional rsync options (default: -avz --delete)"
                retentionPolicy:
                  type: object
                  properties:
                    keepDaily:
                      type: integer
                      description: "Number of daily backups to keep"
                    keepWeekly:
                      type: integer
                      description: "Number of weekly backups to keep"
                enabled:
                  type: boolean
                  description: "Enable/disable replication"
                  default: true
            status:
              type: object
              properties:
                lastScheduleTime:
                  type: string
                  format: date-time
                lastSuccessfulTime:
                  type: string
                  format: date-time
                active:
                  type: integer
                state:
                  type: string
                  enum: ["Idle", "Active", "Error"]
                error:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Source PVC
          type: string
          jsonPath: .spec.sourcePVC
        - name: Target Cluster
          type: string
          jsonPath: .spec.targetCluster
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: State
          type: string
          jsonPath: .status.state
        - name: Last Success
          type: string
          jsonPath: .status.lastSuccessfulTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: pvcreplications
    singular: pvcreplication
    kind: PVCReplication
    shortNames:
      - pvcr
      - pvcrep
